<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Streamable HTTP Progress Client</title>
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 24px; background: #f7f9fc; color: #1e2a3a; }
    .card { max-width: 760px; background: #fff; border: 1px solid #dbe3ef; border-radius: 12px; padding: 16px; }
    h1 { margin-top: 0; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button { border: 0; background: #1d4ed8; color: white; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
    button.secondary { background: #475569; }
    progress { width: 100%; height: 20px; margin: 12px 0; }
    pre { background: #0f172a; color: #e2e8f0; padding: 12px; border-radius: 8px; height: 220px; overflow: auto; }
    .meta { font-size: 14px; color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Streamable HTTP 進捗クライアント</h1>
    <p class="meta">接続先: <code>http://localhost:3001/progress-stream</code></p>
    <div class="row">
      <button id="startBtn">読み取り開始</button>
      <button id="cancelBtn" class="secondary">読み取り中断</button>
      <span id="status">状態: 未開始</span>
    </div>
    <progress id="bar" value="0" max="100"></progress>
    <div id="percent">0%</div>
    <pre id="log"></pre>
  </div>

  <script>
    const bar = document.getElementById('bar');
    const percentLabel = document.getElementById('percent');
    const log = document.getElementById('log');
    const status = document.getElementById('status');

    let lastPercent = 0;
    let controller = null;

    function appendLog(line) {
      log.textContent += `${new Date().toISOString()} ${line}\n`;
      log.scrollTop = log.scrollHeight;
    }

    function setProgress(percent) {
      if (percent < lastPercent) return;
      lastPercent = percent;
      bar.value = percent;
      percentLabel.textContent = `${percent}%`;
    }

    async function start() {
      if (controller) {
        controller.abort();
      }
      controller = new AbortController();
      log.textContent = '';
      lastPercent = 0;
      setProgress(0);

      status.textContent = '状態: 読み取り中';
      appendLog('start');

      const response = await fetch('http://localhost:3001/progress-stream', {
        signal: controller.signal,
      });

      if (!response.ok || !response.body) {
        throw new Error(`response_error ${response.status}`);
      }

      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const msg = JSON.parse(line);
            if (msg.type === 'progress') {
              setProgress(msg.percent);
              appendLog(`progress ${msg.percent}% ${msg.message}`);
            }
            if (msg.type === 'done') {
              setProgress(100);
              appendLog('done');
              status.textContent = '状態: 完了';
              return;
            }
          } catch (error) {
            appendLog(`parse_error ${error.message}`);
          }
        }
      }

      status.textContent = '状態: ストリーム終了';
      appendLog('stream_closed');
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
      try {
        await start();
      } catch (error) {
        if (error.name === 'AbortError') {
          status.textContent = '状態: 中断';
          appendLog('aborted_by_user');
          return;
        }
        status.textContent = '状態: エラー';
        appendLog(`error ${error.message}`);
      }
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      if (!controller) return;
      controller.abort();
      controller = null;
    });
  </script>
</body>
</html>
